<!doctype html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Zen Maru Gothic', sans-serif; }
    .tab-active { background: var(--primary); color: #fff; transform: scale(1.02); }
    .tab-inactive { background: var(--surface); color: var(--text); }
    .record-enter { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .pop { animation: pop 0.35s ease; }
    :root {
      --bg: #FFF8F0;
      --surface: #FFFFFF;
      --text: #3D2C1E;
      --primary: #FF7043;
      --secondary: #FFAB91;
    }
    .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards; }
    @keyframes toastIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastOut { to{opacity:0;transform:translateY(-20px)} }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor:pointer; }
    .book-select-dropdown { max-height: 180px; overflow-y: auto; }
    body { box-sizing: border-box; }
  </style>
</head>
<body class="h-full" style="background:var(--bg);color:var(--text)">
  <div id="app" class="h-full w-full flex flex-col overflow-auto">
    <header class="flex items-center justify-center gap-2 pt-5 pb-3 px-4">
      <span class="text-3xl">📚</span>
      <h1 id="appTitle" class="text-2xl font-black tracking-tight" style="color:var(--primary)">読書キロク</h1>
    </header>

    <div class="px-4 pb-3 max-w-lg mx-auto w-full">
      <div id="studentInputMode" class="grid grid-cols-4 gap-2">
        <input type="text" id="studentGrade" placeholder="学年" maxlength="2" class="rounded-lg p-2 text-sm font-bold bg-white outline-none placeholder-gray-300" style="color:var(--text);border:1px solid var(--secondary)">
        <input type="text" id="studentClass" placeholder="組" maxlength="2" class="rounded-lg p-2 text-sm font-bold bg-white outline-none placeholder-gray-300" style="color:var(--text);border:1px solid var(--secondary)">
        <input type="text" id="studentNumber" placeholder="番" maxlength="2" class="rounded-lg p-2 text-sm font-bold bg-white outline-none placeholder-gray-300" style="color:var(--text);border:1px solid var(--secondary)">
        <input type="text" id="studentName" placeholder="氏名" maxlength="10" class="rounded-lg p-2 text-sm font-bold bg-white outline-none placeholder-gray-300" style="color:var(--text);border:1px solid var(--secondary)">
      </div>
      <button id="btnFixStudent" onclick="fixStudent()" class="w-full mt-2 py-2 rounded-lg font-bold text-sm text-white transition-all active:scale-95" style="background:var(--primary)">確定する</button>
      <div id="studentDisplayMode" class="hidden text-center py-3 px-4 rounded-lg font-bold" style="background:var(--surface);border:2px solid var(--secondary)">
        <span id="studentInfo" class="text-lg" style="color:var(--text)"></span>
        <button id="btnEditStudent" onclick="editStudent()" class="ml-2 text-xs px-2 py-1 rounded-full hover:bg-gray-200" style="color:var(--primary)">変更</button>
      </div>
    </div>

    <div class="flex gap-2 px-4 mb-3 max-w-lg mx-auto w-full">
      <button id="tabInput" onclick="switchTab('input')" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 tab-active flex items-center justify-center gap-1.5">
        <i data-lucide="pencil" style="width:16px;height:16px"></i>きろく
      </button>
      <button id="tabStats" onclick="switchTab('stats')" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 tab-inactive flex items-center justify-center gap-1.5">
        <i data-lucide="bar-chart-3" style="width:16px;height:16px"></i>まとめ
      </button>
    </div>

    <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-bold text-white text-sm shadow-lg" style="background:var(--primary)"></div>

    <div id="viewInput" class="flex-1 px-4 pb-6">
      <div class="max-w-lg mx-auto space-y-3">
        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <label class="text-xs font-bold opacity-60 mb-1 block">📅 日付</label>
          <input type="date" id="inputDate" class="w-full text-lg font-bold bg-transparent outline-none" style="color:var(--text)">
        </div>

        <div class="rounded-2xl p-4 shadow-sm relative" style="background:var(--surface)">
          <label class="text-xs font-bold opacity-60 mb-1 block">📖 書名</label>
          <div class="flex items-center gap-2">
            <input type="text" id="inputTitle" placeholder="本のタイトル" autocomplete="off" class="flex-1 text-lg font-bold bg-transparent outline-none placeholder-gray-300" style="color:var(--text)" oninput="onTitleInput()" onfocus="onTitleFocus()" onblur="setTimeout(()=>hideDropdown(),150)">
            <button id="btnClearTitle" onclick="clearTitle()" class="hidden p-1 rounded-full hover:bg-gray-100">
              <i data-lucide="x" style="width:16px;height:16px;color:#aaa"></i>
            </button>
          </div>
          <div id="titleDropdown" class="hidden absolute left-4 right-4 top-full mt-1 rounded-xl shadow-lg z-30 book-select-dropdown" style="background:var(--surface);border:2px solid var(--secondary)"></div>
        </div>

        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <label class="text-xs font-bold opacity-60 mb-2 block">🏷️ ジャンル</label>
          <div class="flex gap-2">
            <button id="btnFiction" onclick="setType('フィクション')" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200" style="background:var(--primary);color:#fff">フィクション</button>
            <button id="btnNonfiction" onclick="setType('ノンフィクション')" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 bg-gray-100" style="color:var(--text)">ノンフィクション</button>
          </div>
        </div>

        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <label class="text-xs font-bold opacity-60 mb-1 block">📄 読んだページ数</label>
          <div class="flex items-center justify-center gap-3">
            <button onclick="adjustPages(-10)" class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl transition-all active:scale-90" style="background:var(--secondary);color:#fff">−</button>
            <input type="number" id="inputPages" placeholder="0" min="0" class="w-20 text-center text-4xl font-black bg-transparent outline-none" style="color:var(--primary)" inputmode="numeric">
            <button onclick="adjustPages(10)" class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl transition-all active:scale-90" style="background:var(--secondary);color:#fff">+</button>
          </div>
        </div>

        <button id="btnSubmit" onclick="submitRecord()" class="w-full py-4 rounded-2xl font-black text-lg text-white shadow-md transition-all duration-200 hover:shadow-lg active:scale-95" style="background:var(--primary)">記録する！ ✏️</button>

        <div id="limitWarning" class="hidden text-center text-sm font-bold p-3 rounded-xl" style="color:var(--primary);background:var(--secondary)">
          記録の上限（999件）に達しました。古い記録を削除してください。
        </div>
      </div>
    </div>

    <div id="viewStats" class="hidden flex-1 px-4 pb-6">
      <div id="statsContent" class="max-w-lg mx-auto space-y-3">
        <div class="grid grid-cols-3 gap-2">
          <div class="rounded-2xl p-3 text-center shadow-sm" style="background:var(--surface)">
            <div class="text-2xl font-black" id="statBooks" style="color:var(--primary)">0</div>
            <div class="text-xs font-bold opacity-60">冊</div>
          </div>
          <div class="rounded-2xl p-3 text-center shadow-sm" style="background:var(--surface)">
            <div class="text-2xl font-black" id="statPages" style="color:var(--primary)">0</div>
            <div class="text-xs font-bold opacity-60">ページ</div>
          </div>
          <div class="rounded-2xl p-3 text-center shadow-sm" style="background:var(--surface)">
            <div class="text-2xl font-black" id="statRecords" style="color:var(--primary)">0</div>
            <div class="text-xs font-bold opacity-60">記録数</div>
          </div>
        </div>

        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <h3 class="text-sm font-bold opacity-60 mb-3">📊 月ごとの読書量（ページ）</h3>
          <div id="monthlyChart" class="flex items-end gap-1 h-28"></div>
          <div id="monthlyLabels" class="flex gap-1 mt-1"></div>
        </div>

        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <h3 class="text-sm font-bold opacity-60 mb-2">🏷️ フィクション vs ノンフィクション</h3>
          <div class="flex items-center gap-3">
            <div class="flex-1 h-5 rounded-full overflow-hidden bg-gray-100 flex">
              <div id="barFiction" class="h-full transition-all duration-500 rounded-l-full" style="background:var(--primary);width:50%"></div>
              <div id="barNonfiction" class="h-full transition-all duration-500 rounded-r-full" style="background:var(--secondary);width:50%"></div>
            </div>
          </div>
          <div class="flex justify-between mt-1 text-xs font-bold opacity-60">
            <span id="labelFiction">フィクション 0冊</span>
            <span id="labelNonfiction">ノンフィクション 0冊</span>
          </div>
        </div>

        <div class="rounded-2xl p-4 shadow-sm" style="background:var(--surface)">
          <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
            <h3 class="text-sm font-bold opacity-60">📝 読書きろく一覧</h3>
            <div class="flex gap-2">
              <button id="btnImportCSV" onclick="triggerCSVImport()" class="text-xs px-3 py-1.5 rounded-lg font-bold transition-all active:scale-95 flex items-center gap-1" style="background:var(--surface);color:var(--primary);border:1px solid var(--secondary)">
                <i data-lucide="upload" style="width:14px;height:14px"></i>CSV読込
              </button>
              <button id="btnExportCSV" onclick="exportCSV()" class="text-xs px-3 py-1.5 rounded-lg font-bold transition-all active:scale-95 flex items-center gap-1" style="background:var(--secondary);color:#fff">
                <i data-lucide="download" style="width:14px;height:14px"></i>CSV
              </button>
            </div>
          </div>
          <input id="csvFileInput" type="file" accept=".csv,text/csv" class="hidden" onchange="importCSV(event)">
          <div id="recordList" class="space-y-1.5 max-h-64 overflow-y-auto"></div>
          <div id="emptyMsg" class="text-center py-6 opacity-40 text-sm font-bold">まだ記録がありません</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = {
      student: 'student-info',
      records: 'readinglog-records',
      idCounter: 'readinglog-id-counter'
    };

    let allRecords = [];
    let currentType = 'フィクション';
    let currentTab = 'input';
    let pendingDelete = null;

    function nextRecordId() {
      const current = parseInt(localStorage.getItem(STORAGE_KEYS.idCounter) || '0', 10) + 1;
      localStorage.setItem(STORAGE_KEYS.idCounter, String(current));
      return `local-${current}`;
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(allRecords));
    }

    function loadRecords() {
      try {
        const stored = localStorage.getItem(STORAGE_KEYS.records);
        allRecords = stored ? JSON.parse(stored) : [];
        if (!Array.isArray(allRecords)) allRecords = [];
      } catch {
        allRecords = [];
      }
      document.getElementById('limitWarning').classList.toggle('hidden', allRecords.length < 999);
    }

    function refreshUIAfterDataChange() {
      document.getElementById('limitWarning').classList.toggle('hidden', allRecords.length < 999);
      if (currentTab === 'stats') renderStats();
    }

    function fixStudent() {
      const grade = document.getElementById('studentGrade').value.trim();
      const cls = document.getElementById('studentClass').value.trim();
      const num = document.getElementById('studentNumber').value.trim();
      const name = document.getElementById('studentName').value.trim();

      if (!grade || !cls || !num || !name) {
        showToast('全ての情報を入力してください');
        return;
      }

      const studentInfo = `${grade}年 ${cls}組 ${num}番 ${name}`;
      localStorage.setItem(STORAGE_KEYS.student, JSON.stringify({ grade, cls, num, name }));

      document.getElementById('studentInputMode').classList.add('hidden');
      document.getElementById('btnFixStudent').classList.add('hidden');
      document.getElementById('studentDisplayMode').classList.remove('hidden');
      document.getElementById('studentInfo').textContent = studentInfo;
    }

    function editStudent() {
      document.getElementById('studentInputMode').classList.remove('hidden');
      document.getElementById('btnFixStudent').classList.remove('hidden');
      document.getElementById('studentDisplayMode').classList.add('hidden');
    }

    function loadStudentInfo() {
      const stored = localStorage.getItem(STORAGE_KEYS.student);
      if (!stored) return;
      try {
        const { grade, cls, num, name } = JSON.parse(stored);
        document.getElementById('studentGrade').value = grade || '';
        document.getElementById('studentClass').value = cls || '';
        document.getElementById('studentNumber').value = num || '';
        document.getElementById('studentName').value = name || '';

        const studentInfo = `${grade}年 ${cls}組 ${num}番 ${name}`;
        document.getElementById('studentInputMode').classList.add('hidden');
        document.getElementById('btnFixStudent').classList.add('hidden');
        document.getElementById('studentDisplayMode').classList.remove('hidden');
        document.getElementById('studentInfo').textContent = studentInfo;
      } catch {
        localStorage.removeItem(STORAGE_KEYS.student);
      }
    }

    function setToday() {
      const d = new Date();
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      document.getElementById('inputDate').value = local.toISOString().split('T')[0];
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('viewInput').classList.toggle('hidden', tab !== 'input');
      document.getElementById('viewStats').classList.toggle('hidden', tab !== 'stats');
      document.getElementById('tabInput').className = `flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-1.5 ${tab === 'input' ? 'tab-active' : 'tab-inactive'}`;
      document.getElementById('tabStats').className = `flex-1 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-1.5 ${tab === 'stats' ? 'tab-active' : 'tab-inactive'}`;
      if (tab === 'stats') renderStats();
      lucide.createIcons();
    }

    function setType(t) {
      currentType = t;
      const f = document.getElementById('btnFiction');
      const n = document.getElementById('btnNonfiction');
      if (t === 'フィクション') {
        f.style.background = 'var(--primary)'; f.style.color = '#fff';
        n.style.background = '#f3f4f6'; n.style.color = 'var(--text)';
      } else {
        n.style.background = 'var(--primary)'; n.style.color = '#fff';
        f.style.background = '#f3f4f6'; f.style.color = 'var(--text)';
      }
    }

    function adjustPages(n) {
      const el = document.getElementById('inputPages');
      const v = Math.max(0, (parseInt(el.value, 10) || 0) + (n > 0 ? 1 : -1));
      el.value = v;
    }

    function getUniqueTitles() {
      const titles = [...new Set(allRecords.map(r => r.title).filter(Boolean))];
      return titles.sort((a, b) => a.localeCompare(b, 'ja'));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function onTitleInput() {
      const val = document.getElementById('inputTitle').value;
      document.getElementById('btnClearTitle').classList.toggle('hidden', !val);
      showFilteredDropdown(val);
    }

    function onTitleFocus() {
      showFilteredDropdown(document.getElementById('inputTitle').value);
    }

    function showFilteredDropdown(query) {
      const titles = getUniqueTitles();
      if (!titles.length) {
        hideDropdown();
        return;
      }
      const filtered = query ? titles.filter(t => t.includes(query)) : titles;
      if (!filtered.length) {
        hideDropdown();
        return;
      }
      const dd = document.getElementById('titleDropdown');
      dd.innerHTML = filtered.map(t => `<div class="px-3 py-2 cursor-pointer hover:bg-orange-50 text-sm font-bold truncate first:rounded-t-xl last:rounded-b-xl" data-title="${escapeHtml(t)}">${escapeHtml(t)}</div>`).join('');
      dd.querySelectorAll('[data-title]').forEach(el => {
        el.addEventListener('click', () => selectTitle(el.getAttribute('data-title').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g, "'")));
      });
      dd.classList.remove('hidden');
    }

    function hideDropdown() {
      document.getElementById('titleDropdown').classList.add('hidden');
    }

    function selectTitle(t) {
      document.getElementById('inputTitle').value = t;
      document.getElementById('btnClearTitle').classList.remove('hidden');
      hideDropdown();
    }

    function clearTitle() {
      document.getElementById('inputTitle').value = '';
      document.getElementById('btnClearTitle').classList.add('hidden');
      hideDropdown();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      t.classList.remove('toast');
      void t.offsetWidth;
      t.classList.add('toast');
      setTimeout(() => t.classList.add('hidden'), 2000);
    }

    function submitRecord() {
      const title = document.getElementById('inputTitle').value.trim();
      const pages = parseInt(document.getElementById('inputPages').value, 10) || 0;
      const date = document.getElementById('inputDate').value;

      if (!title) { showToast('📖 書名を入れてね'); return; }
      if (!pages) { showToast('📄 ページ数を入れてね'); return; }
      if (!date) { showToast('📅 日付を入れてね'); return; }
      if (allRecords.length >= 999) {
        document.getElementById('limitWarning').classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.textContent = '記録中...';

      const record = {
        __backendId: nextRecordId(),
        date,
        title,
        type: currentType,
        pages
      };

      allRecords.push(record);
      saveRecords();
      refreshUIAfterDataChange();

      btn.disabled = false;
      btn.textContent = '記録する！ ✏️';
      showToast('✅ 記録できたよ！');
      btn.classList.add('pop');
      setTimeout(() => btn.classList.remove('pop'), 400);

      document.getElementById('inputTitle').value = '';
      document.getElementById('inputPages').value = '';
      document.getElementById('btnClearTitle').classList.add('hidden');
      setToday();
    }

    function renderStats() {
      const sorted = [...allRecords].sort((a, b) => String(b.date).localeCompare(String(a.date)));
      const totalPages = allRecords.reduce((s, r) => s + (Number(r.pages) || 0), 0);
      const uniqueBooks = new Set(allRecords.map(r => r.title)).size;

      document.getElementById('statBooks').textContent = uniqueBooks;
      document.getElementById('statPages').textContent = totalPages.toLocaleString('ja-JP');
      document.getElementById('statRecords').textContent = allRecords.length;

      const months = {};
      const now = new Date();
      for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        months[key] = 0;
      }
      allRecords.forEach(r => {
        const key = String(r.date || '').substring(0, 7);
        if (key in months) months[key] += Number(r.pages) || 0;
      });

      const maxP = Math.max(1, ...Object.values(months));
      const chart = document.getElementById('monthlyChart');
      const labels = document.getElementById('monthlyLabels');
      chart.innerHTML = '';
      labels.innerHTML = '';
      Object.entries(months).forEach(([k, v]) => {
        const pct = Math.max(4, (v / maxP) * 100);
        chart.innerHTML += `<div class="flex-1 rounded-t-lg transition-all duration-500 relative group" style="height:${pct}%;background:var(--primary);opacity:${v ? 1 : 0.25}"><div class="absolute -top-5 left-1/2 -translate-x-1/2 text-xs font-bold whitespace-nowrap" style="color:var(--primary)">${v || ''}</div></div>`;
        labels.innerHTML += `<div class="flex-1 text-center text-xs opacity-50 font-bold">${parseInt(k.split('-')[1], 10)}月</div>`;
      });

      const fiction = new Set(allRecords.filter(r => r.type === 'フィクション').map(r => r.title)).size;
      const nonfiction = new Set(allRecords.filter(r => r.type === 'ノンフィクション').map(r => r.title)).size;
      const total = fiction + nonfiction || 1;
      document.getElementById('barFiction').style.width = `${(fiction / total) * 100}%`;
      document.getElementById('barNonfiction').style.width = `${(nonfiction / total) * 100}%`;
      document.getElementById('labelFiction').textContent = `フィクション ${fiction}冊`;
      document.getElementById('labelNonfiction').textContent = `ノンフィクション ${nonfiction}冊`;

      const list = document.getElementById('recordList');
      const empty = document.getElementById('emptyMsg');
      if (!sorted.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        lucide.createIcons();
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = sorted.map(r => `
        <div class="flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-orange-50 record-enter" data-id="${escapeHtml(r.__backendId)}">
          <span class="text-xs opacity-50 font-bold shrink-0">${escapeHtml(String(r.date).substring(5).replace('-', '/'))}</span>
          <span class="text-sm font-bold truncate flex-1">${escapeHtml(r.title)}</span>
          <span class="text-xs px-1.5 py-0.5 rounded-full font-bold shrink-0" style="background:${r.type === 'フィクション' ? 'var(--primary)' : 'var(--secondary)'};color:#fff">${r.type === 'フィクション' ? 'F' : 'NF'}</span>
          <span class="text-xs font-black shrink-0" style="color:var(--primary)">${escapeHtml(String(r.pages))}p</span>
          <button onclick="deleteRecord('${String(r.__backendId).replace(/'/g, "\\'")}')" class="p-1 rounded-full hover:bg-red-100 shrink-0 opacity-30 hover:opacity-100 transition-opacity">
            <i data-lucide="trash-2" style="width:12px;height:12px;color:#e53e3e"></i>
          </button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function deleteRecord(id) {
      const rec = allRecords.find(r => r.__backendId === id);
      if (!rec) return;
      const el = document.querySelector(`[data-id="${CSS.escape(id)}"]`);

      if (pendingDelete !== id) {
        pendingDelete = id;
        if (el) el.style.background = '#fee2e2';
        showToast('もう一度タップで削除');
        setTimeout(() => {
          if (pendingDelete === id) {
            pendingDelete = null;
            if (el) el.style.background = '';
          }
        }, 3000);
        return;
      }

      pendingDelete = null;
      allRecords = allRecords.filter(r => r.__backendId !== id);
      saveRecords();
      refreshUIAfterDataChange();
      showToast('🗑️ 削除しました');
    }

    function getStudentDisplayText(compact = false) {
      const stored = localStorage.getItem(STORAGE_KEYS.student);
      if (!stored) return '（未設定）';
      try {
        const { grade, cls, num, name } = JSON.parse(stored);
        return compact ? `${grade}年${cls}組${num}番 ${name}` : `${grade}年 ${cls}組 ${num}番 ${name}`;
      } catch {
        return '（未設定）';
      }
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      if (/[,"\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function exportCSV() {
      if (!allRecords.length) {
        showToast('記録がありません');
        return;
      }

      const studentName = getStudentDisplayText(true);
      const headers = ['日付', '書名', 'ジャンル', 'ページ数'];
      const rows = [...allRecords]
        .sort((a, b) => String(b.date).localeCompare(String(a.date)))
        .map(r => [
          String(r.date).replace(/-/g, '/'),
          r.title,
          r.type,
          r.pages
        ]);

      const csv = [
        `読書きろく - ${studentName}`,
        `出力日時: ${new Date().toLocaleString('ja-JP')}`,
        '',
        headers.join(','),
        ...rows.map(r => r.map(csvEscape).join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `読書きろく_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
      showToast('📥 CSVをダウンロード中...');
    }

    function triggerCSVImport() {
      document.getElementById('csvFileInput').click();
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function importCSV(event) {
      const file = event.target.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = String(reader.result || '').replace(/^\uFEFF/, '');
          const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
          const headerIndex = lines.findIndex(line => {
            const cols = parseCSVLine(line).map(v => v.trim());
            return cols[0] === '日付' && cols[1] === '書名' && cols[2] === 'ジャンル' && cols[3] === 'ページ数';
          });

          if (headerIndex === -1) {
            showToast('CSVの形式を確認してください');
            event.target.value = '';
            return;
          }

          const imported = [];
          for (let i = headerIndex + 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            if (cols.length < 4) continue;
            const date = (cols[0] || '').trim().replace(/\//g, '-');
            const title = (cols[1] || '').trim();
            const type = (cols[2] || '').trim();
            const pages = parseInt((cols[3] || '').trim(), 10);

            if (!date || !title || !type || !Number.isFinite(pages)) continue;
            if (type !== 'フィクション' && type !== 'ノンフィクション') continue;

            imported.push({
              __backendId: nextRecordId(),
              date,
              title,
              type,
              pages
            });
          }

          if (!imported.length) {
            showToast('復元できる記録がありません');
            event.target.value = '';
            return;
          }

          const existingKeys = new Set(allRecords.map(r => `${r.date}__${r.title}__${r.type}__${r.pages}`));
          const uniqueImported = imported.filter(r => {
            const key = `${r.date}__${r.title}__${r.type}__${r.pages}`;
            if (existingKeys.has(key)) return false;
            existingKeys.add(key);
            return true;
          });

          if (!uniqueImported.length) {
            showToast('同じ記録はすでに入っています');
            event.target.value = '';
            return;
          }

          const room = 999 - allRecords.length;
          const toAdd = uniqueImported.slice(0, Math.max(0, room));
          allRecords = [...allRecords, ...toAdd];
          saveRecords();
          refreshUIAfterDataChange();

          if (toAdd.length < uniqueImported.length) {
            showToast(`上限のため ${toAdd.length}件だけ復元しました`);
          } else {
            showToast(`✅ ${toAdd.length}件を復元しました`);
          }
        } catch {
          showToast('CSVの読込に失敗しました');
        } finally {
          event.target.value = '';
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    loadStudentInfo();
    loadRecords();
    setToday();
    setType('フィクション');
    refreshUIAfterDataChange();
    lucide.createIcons();
  </script>
</body>
</html>
